<svg xmlns="http://www.w3.org/2000/svg" width="960" height="700" viewBox="0 0 960 700" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/>
    </marker>
    <marker id="arrowg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4ade80"/>
    </marker>
    <radialGradient id="nodeGrad" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0c1f38"/>
    </radialGradient>
  </defs>

  <rect width="960" height="700" fill="#0a0e17"/>

  <!-- title -->
  <text x="480" y="42" text-anchor="middle" fill="#f1f5f9" font-size="26" font-weight="700">XolixDB</text>
  <text x="480" y="66" text-anchor="middle" fill="#94a3b8" font-size="14">the metadata distribution tier for NANDA&#8217;s agentic web</text>

  <!-- TIER 1: NANDA lean index -->
  <rect x="270" y="92" width="420" height="66" rx="10" fill="#111827" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="480" y="118" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="600">NANDA Lean Index  (&#8804;120 B AgentAddr records)</text>
  <text x="480" y="140" text-anchor="middle" fill="#94a3b8" font-size="12">agent_id &#8594; facts_url / private_facts_url &#8594; points into XolixDB</text>

  <line x1="480" y1="158" x2="480" y2="196" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="494" y="182" fill="#7dd3fc" font-size="11">resolve facts_url</text>

  <!-- TIER 2: XolixDB ring -->
  <rect x="120" y="200" width="720" height="300" rx="14" fill="#0d1526" stroke="#334155" stroke-width="1.5"/>
  <text x="150" y="230" fill="#e2e8f0" font-size="15" font-weight="600">XolixDB cluster &#8212; consistent-hash ring, RF=3, W/R quorums</text>

  <!-- ring circle -->
  <circle cx="330" cy="368" r="102" fill="none" stroke="#1e293b" stroke-width="2" stroke-dasharray="5 5"/>
  <!-- 5 nodes on the ring -->
  <g font-size="11" fill="#e2e8f0" text-anchor="middle">
    <circle cx="330" cy="266" r="26" fill="url(#nodeGrad)" stroke="#38bdf8" stroke-width="1.5"/><text x="330" y="270">n0</text>
    <circle cx="427" cy="336" r="26" fill="url(#nodeGrad)" stroke="#38bdf8" stroke-width="1.5"/><text x="427" y="340">n1</text>
    <circle cx="390" cy="450" r="26" fill="url(#nodeGrad)" stroke="#38bdf8" stroke-width="1.5"/><text x="390" y="454">n2</text>
    <circle cx="270" cy="450" r="26" fill="url(#nodeGrad)" stroke="#38bdf8" stroke-width="1.5"/><text x="270" y="454">n3</text>
    <circle cx="233" cy="336" r="26" fill="url(#nodeGrad)" stroke="#38bdf8" stroke-width="1.5"/><text x="233" y="340">n4</text>
  </g>
  <!-- gossip arcs -->
  <g stroke="#4ade80" stroke-width="1.3" fill="none" opacity="0.85">
    <path d="M352 282 Q400 290 415 314" marker-end="url(#arrowg)"/>
    <path d="M420 362 Q420 410 402 428" marker-end="url(#arrowg)"/>
    <path d="M364 456 Q330 470 296 456" marker-end="url(#arrowg)"/>
    <path d="M252 428 Q236 396 233 362" marker-end="url(#arrowg)"/>
    <path d="M245 314 Q272 288 306 272" marker-end="url(#arrowg)"/>
  </g>
  <text x="330" y="374" text-anchor="middle" fill="#4ade80" font-size="11">gossip anti-entropy ~1s</text>
  <text x="330" y="390" text-anchor="middle" fill="#64748b" font-size="10">read-repair &#183; sloppy quorum</text>

  <!-- primitive callouts -->
  <g font-size="12">
    <rect x="510" y="252" width="300" height="68" rx="8" fill="#111827" stroke="#8b5cf6" stroke-width="1.2"/>
    <text x="524" y="274" fill="#c4b5fd" font-weight="600">Self-certifying names</text>
    <text x="524" y="292" fill="#94a3b8" font-size="11">agent_id = did:xolix:h(pubkey)</text>
    <text x="524" y="308" fill="#94a3b8" font-size="11">only the keyholder can write &#8212; no CA</text>

    <rect x="510" y="330" width="300" height="68" rx="8" fill="#111827" stroke="#8b5cf6" stroke-width="1.2"/>
    <text x="524" y="352" fill="#c4b5fd" font-weight="600">Owner-serialized consistency</text>
    <text x="524" y="370" fill="#94a3b8" font-size="11">highest signed version wins &#183; stale replay 409</text>
    <text x="524" y="386" fill="#94a3b8" font-size="11">same-version fork = flagged equivocation</text>

    <rect x="510" y="408" width="300" height="68" rx="8" fill="#111827" stroke="#8b5cf6" stroke-width="1.2"/>
    <text x="524" y="430" fill="#c4b5fd" font-weight="600">TTL leases + hash chain</text>
    <text x="524" y="448" fill="#94a3b8" font-size="11">records expire unless re-signed &#183; 410 tombstones</text>
    <text x="524" y="464" fill="#94a3b8" font-size="11">tamper-evident per-agent audit history</text>
  </g>

  <!-- TIER 3: agents & clients -->
  <line x1="300" y1="560" x2="300" y2="504" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="504" x2="660" y2="560" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="150" y="562" width="300" height="76" rx="10" fill="#111827" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="300" y="588" text-anchor="middle" fill="#7dd3fc" font-size="14" font-weight="600">Agents (writers)</text>
  <text x="300" y="608" text-anchor="middle" fill="#94a3b8" font-size="11">publish Ed25519-signed AgentFacts</text>
  <text x="300" y="624" text-anchor="middle" fill="#94a3b8" font-size="11">heartbeat re-signs the lease &#183; verify-on-write 403</text>

  <rect x="510" y="562" width="300" height="76" rx="10" fill="#111827" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="660" y="588" text-anchor="middle" fill="#7dd3fc" font-size="14" font-weight="600">Clients (readers)</text>
  <text x="660" y="608" text-anchor="middle" fill="#94a3b8" font-size="11">any-node resolve in ms &#183; re-verify signatures</text>
  <text x="660" y="624" text-anchor="middle" fill="#94a3b8" font-size="11">zero trust: a hacked node can&#8217;t forge endpoints</text>

  <text x="480" y="676" text-anchor="middle" fill="#475569" font-size="11">Xolix.AI Research Labs &#8212; XolixDB v0.1 &#183; complements Project NANDA (arXiv:2507.14263)</text>
</svg>
